<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>365 Polaroid Project</title>

<style>
body {
  margin: 0;
  overflow: hidden;
  font-family: monospace;
  background: black;
}

/* SCREENS */
.screen {
  display: none;
  width: 100vw;
  height: 100vh;
  position: relative;
}

.active {
  display: block;
}

/* BACKGROUND IMAGE (YOUR SURF IMAGE) */
.bg {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

/* MONKE SURFER */
.monke {
  position: absolute;
  bottom: 120px;
  left: -100px;
  width: 120px;
  animation: surf 4s linear forwards;
}

/* SURF ANIMATION */
@keyframes surf {
  0% { left: -100px; transform: rotate(0deg); }
  50% { left: 40%; transform: rotate(10deg); }
  100% { left: 110%; transform: rotate(-5deg); }
}

/* FLASH */
.flash {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: white;
  opacity: 0;
  pointer-events: none;
}

/* MENU */
.menu {
  display: flex;
  justify-content: center;
  align-items: center;
  gap: 40px;
  height: 100%;
  background: #87CEEB;
}

/* POLAROID */
.polaroid {
  width: 160px;
  height: 200px;
  background: white;
  padding: 10px;
  box-shadow: 5px 5px black;
  cursor: pointer;
  text-align: center;
}

.polaroid img {
  width: 100%;
  height: 130px;
  object-fit: cover;
}

/* CONTENT PAGES */
.page {
  display: none;
  height: 100vh;
  background: #f4f4f4;
  text-align: center;
  padding-top: 50px;
}

.page.active {
  display: block;
}

button {
  margin-top: 20px;
  padding: 10px;
  cursor: pointer;
}
</style>
</head>

<body>

<!-- FLASH -->
<div class="flash" id="flash"></div>

<!-- INTRO -->
<div id="intro" class="screen active">
  
  <!-- 🔥 REPLACE WITH YOUR UPLOADED IMAGE -->
  <img src="your-wave-image.jpg" class="bg">

  <!-- 🐒 MONKE SURFER IMAGE -->
  <!-- 🔥 REPLACE WITH YOUR MONKE IMAGE -->
  <img src="monke-surfer.png" class="monke">

</div>

<!-- MENU -->
<div id="menu" class="screen">
  <div class="menu">

    <!-- ABOUT -->
    <div class="polaroid" onclick="openPage('about')">
      <img src="about.jpg">
      <p>About Me</p>
    </div>

    <!-- GALLERY -->
    <div class="polaroid" onclick="openPage('gallery')">
      <img src="gallery.jpg">
      <p>Gallery</p>
    </div>

    <!-- CONTACT -->
    <div class="polaroid" onclick="openPage('contact')">
      <img src="contact.jpg">
      <p>Contact</p>
    </div>

  </div>
</div>

<!-- ABOUT PAGE -->
<div id="about" class="page">
  <h1>About Me</h1>
  <p>Write about your 365-day Polaroid project here.</p>
  <button onclick="goBack()">Back</button>
</div>

<!-- GALLERY PAGE -->
<div id="gallery" class="page">
  <h1>Photo Gallery</h1>

  <!-- 📸 ADD YOUR PHOTOS HERE -->
  <img src="photo1.jpg" width="150">
  <img src="photo2.jpg" width="150">
  <img src="photo3.jpg" width="150">

  <br>
  <button onclick="goBack()">Back</button>
</div>

<!-- CONTACT PAGE -->
<div id="contact" class="page">
  <h1>Contact</h1>
  <p>Email: your@email.com</p>
  <p>Instagram: @yourhandle</p>
  <button onclick="goBack()">Back</button>
</div>

<script>
// TIMELINE: SURF → FLASH → MENU
setTimeout(() => {
  document.getElementById("flash").style.opacity = 1;

  setTimeout(() => {
    document.getElementById("intro").classList.remove("active");
    document.getElementById("menu").classList.add("active");
    document.getElementById("flash").style.opacity = 0;
  }, 400);

}, 3500);

// OPEN PAGE
function openPage(page) {
  document.getElementById("menu").classList.remove("active");
  document.getElementById(page).classList.add("active");
}

// BACK
function goBack() {
  document.querySelectorAll(".page").forEach(p => p.classList.remove("active"));
  document.getElementById("menu").classList.add("active");
}
</script>

</body>
</html>
<img src="your-wave-image.jpg">
<img src="monke-surfer.png">
