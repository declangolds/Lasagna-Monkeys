<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>365 Polaroid Project</title>
<style>
  body {
    margin: 0;
    font-family: "Courier New", monospace;
    background: #87CEEB;
    overflow: hidden;
    color: #111;
  }

  /* PIXEL STYLE */
  h1, h2 {
    text-align: center;
    text-shadow: 2px 2px #fff;
  }

  .screen {
    display: none;
    height: 100vh;
    justify-content: center;
    align-items: center;
    flex-direction: column;
  }

  .active {
    display: flex;
  }

  /* SURFER ANIMATION */
  .wave {
    width: 200px;
    height: 100px;
    background: blue;
    border-radius: 50%;
    position: relative;
    animation: waveMove 3s infinite;
  }

  .surfer {
    width: 40px;
    height: 40px;
    background: yellow;
    position: absolute;
    top: -30px;
    left: 80px;
    animation: surf 3s infinite;
  }

  @keyframes waveMove {
    0% { transform: translateX(-50px); }
    50% { transform: translateX(50px); }
    100% { transform: translateX(-50px); }
  }

  @keyframes surf {
    0% { transform: rotate(0deg); }
    50% { transform: rotate(10deg); }
    100% { transform: rotate(0deg); }
  }

  /* FLASH EFFECT */
  .flash {
    position: fixed;
    width: 100%;
    height: 100%;
    background: white;
    opacity: 0;
    pointer-events: none;
  }

  /* POLAROID MENU */
  .menu {
    display: flex;
    gap: 20px;
  }

  .polaroid {
    width: 150px;
    height: 180px;
    background: white;
    padding: 10px;
    cursor: pointer;
    box-shadow: 4px 4px black;
    text-align: center;
  }

  .polaroid img {
    width: 100%;
    height: 120px;
    object-fit: cover;
  }

  /* BACK BUTTON */
  button {
    margin-top: 20px;
    padding: 10px;
    cursor: pointer;
  }
</style>
</head>

<body>

<!-- FLASH -->
<div class="flash" id="flash"></div>

<!-- INTRO SCREEN -->
<div id="intro" class="screen active">
  <h1>365 Polaroid Project</h1>
  <div class="wave">
    <div class="surfer"></div>
  </div>
</div>

<!-- MENU SCREEN -->
<div id="menu" class="screen">
  <h2>Select a Polaroid</h2>
  <div class="menu">
    
    <!-- ABOUT -->
    <div class="polaroid" onclick="openPage('about')">
      <img src="YOUR_ABOUT_IMAGE.jpg">
      <p>About Me</p>
    </div>

    <!-- GALLERY -->
    <div class="polaroid" onclick="openPage('gallery')">
      <img src="YOUR_GALLERY_IMAGE.jpg">
      <p>Gallery</p>
    </div>

    <!-- CONTACT -->
    <div class="polaroid" onclick="openPage('contact')">
      <img src="YOUR_CONTACT_IMAGE.jpg">
      <p>Contact</p>
    </div>

  </div>
</div>

<!-- ABOUT PAGE -->
<div id="about" class="screen">
  <h2>About Me</h2>
  <p>This is where you write about your 365-day Polaroid project.</p>
  <button onclick="goBack()">Back</button>
</div>

<!-- GALLERY PAGE -->
<div id="gallery" class="screen">
  <h2>Photo Gallery</h2>

  <!-- 🔥 ADD YOUR POLAROIDS HERE -->
  <img src="PHOTO1.jpg" width="150">
  <img src="PHOTO2.jpg" width="150">
  <img src="PHOTO3.jpg" width="150">

  <button onclick="goBack()">Back</button>
</div>

<!-- CONTACT PAGE -->
<div id="contact" class="screen">
  <h2>Contact</h2>
  <p>Email: your@email.com</p>
  <p>Instagram: @yourhandle</p>
  <button onclick="goBack()">Back</button>
</div>

<script>
  // AUTO TRANSITION INTRO → FLASH → MENU
  setTimeout(() => {
    document.getElementById("flash").style.opacity = "1";

    setTimeout(() => {
      document.getElementById("flash").style.opacity = "0";
      document.getElementById("intro").classList.remove("active");
      document.getElementById("menu").classList.add("active");
    }, 500);

  }, 3000);

  function openPage(page) {
    document.getElementById("menu").classList.remove("active");
    document.getElementById(page).classList.add("active");
  }

  function goBack() {
    document.querySelectorAll(".screen").forEach(s => s.classList.remove("active"));
    document.getElementById("menu").classList.add("active");
  }
</script>

</body>
</html>
